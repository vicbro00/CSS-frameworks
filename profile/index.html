<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="/node_modules/bootstrap/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <header class="bg-white shadow-sm mb-4">
        <div class="container">
        <ul class="nav nav-tabs justify-content-center py-2">
            <li class="nav-item">
                <a class="nav-link" href="/index.html">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/feed/index.html">Feed</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/profile/index.html">Profile</a>
            </li>
        </ul>
        </div>
    </header>

    <main class="container">
        <section class="profile-info text-center mb-4">
        <img alt="Profile Picture" class="rounded-circle mb-2" />
        <h2 class="mb-2">@username</h2>
        <button class="btn btn-primary">Follow</button>
        </section>

        <section class="followers text-center mb-5">
        <h3>Followers / Following</h3>
        <p class="text-muted">Followers: 10 | Following: 5</p>
        </section>

        <section class="user-posts">
        <h3 class="mb-3">Your Posts</h3>
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
            <div class="col">
            <article class="card h-100">
                <img class="card-img-top" alt="Post image" />
                <div class="card-body">
                <h4 class="card-title">Post Title</h4>
                </div>
            </article>
            </div>
        </div>
        </section>
    </main>

    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
