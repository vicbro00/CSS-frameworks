<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="/node_modules/bootstrap/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <header class="bg-white shadow-sm mb-4">
        <div class="container">
        <ul class="nav nav-tabs justify-content-center py-2">
            <li class="nav-item">
                <a class="nav-link" href="/index.html">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/feed/index.html">Feed</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/profile/index.html">Profile</a>
            </li>
        </ul>
        </div>
    </header>

    <main class="container">
        <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm p-4">
            <h1 class="text-center mb-4">Login or Register</h1>
            <form action="/profile" method="get" novalidate>
                <div class="mb-3">
                <label for="username" class="form-label">Username:</label>
                <input type="text" id="username" name="username" class="form-control" required />
                </div>
                <div class="mb-3">
                <label for="password" class="form-label">Password:</label>
                <input type="password" id="password" name="password" class="form-control" required minlength="8" />
                </div>
                <button type="submit" class="btn btn-primary w-100">Continue</button>
            </form>
            </div>
        </div>
        </div>
    </main>

    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
