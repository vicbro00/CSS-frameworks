<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feed</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="/node_modules/bootstrap/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <header class="bg-white shadow-sm mb-4">
        <div class="container">
        <ul class="nav nav-tabs justify-content-center py-2">
            <li class="nav-item">
                <a class="nav-link" href="/index.html">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/feed/index.html">Feed</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/profile/index.html">Profile</a>
            </li>
        </ul>
        </div>
    </header>

    <main class="container">
        <section class="mb-4">
        <div class="row g-2 align-items-end">
            <div class="col-md-4">
            <input type="text" class="form-control" placeholder="Search posts..." />
            </div>
            <div class="col-md-3">
            <select class="form-select">
                <option value="latest">Latest</option>
                <option value="popular">Most Popular</option>
            </select>
            </div>
            <div class="col-md-5">
            <form class="d-flex flex-column flex-md-row gap-2">
                <input type="text" class="form-control" placeholder="Post title" required />
                <input type="url" class="form-control" placeholder="Image URL (optional)" />
                <button type="submit" class="btn btn-primary">Post</button>
            </form>
            </div>
        </div>
        </section>

        <section class="row" id="post-list">
        <div class="col-md-4 mb-4">
            <article class="card h-100 shadow-sm">
            <img class="card-img-top" alt="Post image">
            <div class="card-body">
                <h5 class="card-title">Example Post Title</h5>
            </div>
            </article>
        </div>
        </section>
    </main>

    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/feed.js" type="module"></script>
    <script src="../js/header.js" defer></script>
</body>
</html>
